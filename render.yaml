services:
  - type: web
    name: loan-test
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: APP_URL
        value: https://loan-test.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: loan-test-db
          property: connectionString
      - key: APP_SESSION_SECRET
        generateValue: true
      - key: STORAGE_DIR
        value: /tmp/loan-test-storage
      - key: OTP_MOCK_ENABLED
        value: "true"
      - key: OTP_DEFAULT_CODE
        value: "123456"

databases:
  - name: loan-test-db
    databaseName: loan_test
    user: loan_test
    plan: free
